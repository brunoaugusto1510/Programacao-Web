<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box model - Aula 6</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topo">
        <h1>Meu Header Fixo</h1>
    </header>

    <main class="container">
        <div class="card">
            <h2>Card 1</h2>
            <p>Este é o primeiro card estilizado com padding, borda e margem.</p>
        </div>
        <div class="card">
            <h2>Card 2</h2>

        </div>
        <div class="card">
            <h2>Card 3</h2>
            <p>O container principal está centralizado com margin: 0 auto.</p>
        </div>
    </main>
</body>
</html>
