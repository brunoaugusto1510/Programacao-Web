<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários - Aula 4</title>
</head>
<body>
    <form action="/cadastro" method="POST">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" minlength="5" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="data_nasc">Data de Nascimento:</label>
            <input type="date" id="data_nasc" name="data_nasc" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" pattern="[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}" required >
        </fieldset>
        <fieldset>
            <legend>Dados Acadêmicos</legend>

            <label for="curso">Curso:</label>
            <select id="curso" name="curso" required>
                <option value="">Selecione</option>
                <option value="cc">Ciência da Computação</option>
                <option value="si">Sistemas de Informação</option>
                <option value="eng">Engenharia de Software</option>
            </select>

            <label for="periodo">Período:</label>
            <input type="radio" id="manha" name="periodo" value="manha" required>
            <label for="manha">Manhã</label>
            <input type="radio" id="noite" name="periodo" value="noite" required>
            <label for="noite">Noite</label>
            
            <label for="programou" >Já programou antes?</label>
            <input type="checkbox" id="programou" name="programou">

            <label for="observacoes">Observações:</label>
            <textarea id="observacoes" name="observacoes"></textarea>
        </fieldset>
        <fieldset>
            <legend>Adicionais</legend>

            <label for="foto">Foto de perfil:</label>
            <input type="file" id="foto" name="foto">

            <label for="cor_fav">Cor favorita:</label>
            <input type="color" id="cor_fav" name="cor_fav">
        </fieldset>

    <button type="submit">
        Enviar
    </button>

    </form>
</body>
</html>
