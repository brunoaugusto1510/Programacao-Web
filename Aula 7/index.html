<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout - Aula 7</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">MeuLogo</div>
        <nav class="links">
            <a href="#">Home</a>
            <a href="#">Sobre</a>
            <a href="#">Serviços</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Bem-vindo ao Hero Section</h1>
            <p>Centralizado com Flexbox</p>
        </div>
    </section>

    <div class="layout-principal">
        <aside class="sidebar">
            <h3>Sidebar</h3>
            <ul>
                <li>Link 1</li>
                <li>Link 2</li>
                <li>Link 3</li>
            </ul>
        </aside>

        <main class="conteudo">
            <h2>Conteúdo Principal</h2>
            <div class="cards-container">
                <div class="card">Card 1</div>
                <div class="card">Card 2</div>
                <div class="card">Card 3</div>
                <div class="card">Card 4</div>
                <div class="card">Card 5</div>
                <div class="card">Card 6</div>
            </div>
        </main>
    </div>

    <footer class="rodape">
        <p>&copy; 2026 - Aula 7 - Flexbox Avançado</p>
    </footer>
</body>
</html>
